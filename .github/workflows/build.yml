name: Yahya-Macro-Build
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
    - name: Compile Macro
      run: |
        cl.exe /EHsc main.cpp /link /SUBSYSTEM:WINDOWS /OUT:Yahya_Macro.exe
    - name: Release
      uses: actions/upload-artifact@v4
      with:
        name: Yahya-G300s-Macro
        path: Yahya_Macro.exe
        
